<script>
  // SLIDER
  let slideIndex = 0;
  function initSlideshow() {
    const campaigns = DataManager.getAllCampaigns();
    const storeSlides = campaigns.filter(c => c.adType === 'slideshow' && c.targetPage === 'store');
    const slider = document.getElementById('store-slider');
    
    if (storeSlides.length > 0) {
      slider.innerHTML = storeSlides.map(c => `
        <div class="slide"><img src="${c.media}"></div>
      `).join('');
    }
    
    const slides = document.querySelectorAll('.slide');
    if (slides.length === 0) return;

    function showSlides(){
      slides.forEach(s => s.style.display='none');
      slideIndex = (slideIndex + 1) > slides.length ? 1 : slideIndex + 1;
      slides[slideIndex-1].style.display='block';
      setTimeout(showSlides, 3000);
    }
    showSlides();
  }

  window.addEventListener('DOMContentLoaded', () => {
    initSlideshow();
  });

  // RANDOM PRODUCTS FROM DataManager
  function getAllFlattened(){
    const all = DataManager.getAllProducts();
    return Object.keys(all).reduce((acc,k)=> acc.concat(all[k]||[]), []);
  }

  window.addToCartById = function(id){
    const prod = getAllFlattened().find(p=>p.id===id);
    if(!prod){ alert('Product not found'); return; }
    DataManager.addToCart(prod);
    alert('Added to cart');
    updateCartBadge();
  }

  function renderProducts(productList, title = "Featured Products"){
    const container = document.getElementById('productContainer');
    const titleEl = document.getElementById('sectionTitle');
    if(titleEl) titleEl.textContent = title;
    
    if(!container) return;
    if(productList.length===0){ container.innerHTML = '<p style="grid-column:1/-1;text-align:center;">No products found</p>'; return; }
    
    container.innerHTML='';
    
    // Check if we have a store promotion
    const campaigns = DataManager.getAllCampaigns();
    const promo = campaigns.find(c => c.adType === 'video' && c.videoAudioType === 'non-audio');

    productList.forEach((p, index) => {
      // After 80 products, insert the promotion
      if (index === 80 && promo) {
          container.innerHTML += `
            <div style="grid-column: 1/-1; padding: 20px 0; text-align: center; background: #eee; margin: 20px 0; border-radius: 16px;">
                <h2 style="margin-bottom: 20px;">Featured Promotion</h2>
                <video autoplay muted loop style="width: 100%; max-width: 1200px; border-radius: 16px; pointer-events: none;">
                    <source src="${promo.media}" type="video/mp4">
                </video>
            </div>`;
      }

      container.innerHTML+=`<div class="product">
        <img src="${p.image||'https://picsum.photos/300/200'}" onclick="openProductDetails('${p.id}', '${p.category || p.subcategory || 'Fresh food'}')">
        <h4>${p.name}</h4>
        <p>KES ${p.price}</p>
        <button onclick="addToCartById('${p.id}')">Add to Cart</button>
      </div>`;
    });
  }

  // Handle Search Query
  const urlParams = new URLSearchParams(window.location.search);
  const searchMatch = urlParams.get('search');
  
  if (searchMatch) {
    const all = getAllFlattened();
    const results = all.filter(p => p.name.toLowerCase().includes(searchMatch.toLowerCase()));
    renderProducts(results, `Search results for "${searchMatch}"`);
  } else {
    const all = getAllFlattened();
    const shuffled = all.slice().sort(()=>0.5-Math.random()).slice(0, 200);
    renderProducts(shuffled, "Featured Products");
  }

    // Category functionality
    const categories = DataManager.getStoreCategories();
    const subcatGrid = document.getElementById('subcatGrid');
    const catModalTitle = document.getElementById('catModalTitle');
    const categoryModal = document.getElementById('categoryModal');

    window.openCategoryModal = function(catId) {
      const category = categories.find(c => c.id === catId);
      if (!category) return;

      catModalTitle.textContent = category.name;
      subcatGrid.innerHTML = '';

      category.subcategories.forEach(sub => {
        const item = document.createElement('div');
        item.className = 'subcat-item';
        item.style.display = 'flex';
        item.style.flexDirection = 'column';
        item.style.alignItems = 'center';
        item.style.gap = '10px';
        item.style.padding = '20px';
        
        item.innerHTML = `
          <div class="subcat-icon" style="width: 50px; height: 50px; background: rgba(59, 130, 246, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(59, 130, 246, 0.3);">
            <i class="fas fa-layer-group" style="color: #3b82f6; font-size: 1.2rem;"></i>
          </div>
          <div class="subcat-name" style="font-size: 0.95rem; font-weight: 600;">${sub}</div>
        `;
        item.onclick = () => {
          const all = getAllFlattened();
          const filtered = all.filter(p => p.subcategory === sub);
          renderProducts(filtered, `${category.name}: ${sub}`);
          closeCategoryModal();
        };
        subcatGrid.appendChild(item);
      });

      categoryModal.style.display = 'flex';
      setTimeout(() => categoryModal.classList.add('active'), 10);
    }

    window.closeCategoryModal = function() {
      categoryModal.classList.remove('active');
      setTimeout(() => categoryModal.style.display = 'none', 300);
    }

    function renderStoreNav() {
      const nav = document.getElementById('storeNav');
      if (!nav) return;
      nav.innerHTML = '';
      categories.forEach(cat => {
        const link = document.createElement('a');
        link.href = '#';
        link.innerHTML = `<i class="${cat.icon || 'fas fa-tag'}"></i> ${cat.name}`;
        link.onclick = (e) => {
          e.preventDefault();
          openCategoryModal(cat.id);
        };
        nav.appendChild(link);
      });
    }

    // Initialize Store
    renderStoreNav();

  // Live Search Bar functionality
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  searchInput.addEventListener('input', () => {
    const query = searchInput.value.trim().toLowerCase();
    if (!query) {
      searchResults.style.display = 'none';
      return;
    }

    const all = getAllFlattened();
    const results = all.filter(p => p.name.toLowerCase().includes(query));

    if (results.length > 0) {
      searchResults.innerHTML = results.map(p => {
        let url = 'store.html?search=' + encodeURIComponent(p.name);
        if (p.subcategory === 'Gas') url = 'gas-refill.html';
        if (p.subcategory === 'Water') url = 'water refil.html';
        
        return `
          <div onclick="window.location.href='${url}'">
            <strong>${p.name}</strong><br>
            <span style="font-size: 12px; color: #666;">Ksh ${p.price}</span>
          </div>
        `;
      }).join('');
      searchResults.style.display = 'block';
    } else {
      searchResults.innerHTML = '<div style="padding: 10px;">No results</div>';
      searchResults.style.display = 'block';
    }
  });

  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
      searchResults.style.display = 'none';
    }
  });

  // Product Details Modal logic
  window.openProductDetails = function(productId, category) {
    const products = DataManager.getAllProducts();
    let product = null;
    
    // Search across all categories in store.html
    for (const cat in products) {
      product = products[cat]?.find(p => p.id === productId);
      if (product) {
        category = cat;
        break;
      }
    }
    
    if(!product) return;

    const modal = document.getElementById('productDetailsModal');
    const mainImg = document.getElementById('modalMainImg');
    const thumbGrid = document.getElementById('modalThumbGrid');
    const title = document.getElementById('modalTitle');
    const price = document.getElementById('modalPrice');
    const desc = document.getElementById('modalDesc');
    const categoryEl = document.getElementById('modalCategory');
    const supplier = document.getElementById('modalSupplier');
    const sku = document.getElementById('modalSKU');
    const sizeSection = document.getElementById('sizeSection');
    const sizeSelector = document.getElementById('modalSizes');
    const relatedGrid = document.getElementById('relatedGrid');
    const addToCartBtn = document.getElementById('modalAddToCartBtn');

    // Basic Info
    title.innerText = product.name;
    price.innerText = `Ksh ${product.price.toLocaleString()}`;
    desc.innerText = product.description || "No description available.";
    categoryEl.innerText = `${category} > ${product.subcategory || ''}`;
    supplier.innerText = product.supplier || "Daimara Store";
    sku.innerText = product.sku || product.id.substring(0, 8).toUpperCase();
    mainImg.src = product.image || 'image-placeholder.jpg';

    // Stars
    const starsEl = document.getElementById('modalStars');
    if (starsEl) {
      starsEl.innerHTML = '';
      const rating = product.rating || 0;
      for (let i = 1; i <= 5; i++) {
        const isFull = i <= Math.floor(rating);
        const isHalf = !isFull && i <= Math.ceil(rating) && (rating % 1 !== 0);
        
        if (isFull) {
          starsEl.innerHTML += '<i class="fas fa-star" style="color:#fbbf24; font-size:1.2rem; margin-right:5px;"></i>';
        } else if (isHalf) {
          starsEl.innerHTML += '<i class="fas fa-star-half-alt" style="color:#fbbf24; font-size:1.2rem; margin-right:5px;"></i>';
        } else {
          starsEl.innerHTML += '<i class="far fa-star" style="color:#fbbf24; font-size:1.2rem; margin-right:5px;"></i>';
        }
      }
      if (rating > 0) {
        starsEl.innerHTML += `<span style="color:#94a3b8; margin-left:10px; font-size:0.9rem;">(${rating.toFixed(1)})</span>`;
      }
    }

    // Gallery
    thumbGrid.innerHTML = '';
    const images = [product.image, ...(product.otherImages || product.otherPhotos || [])].filter(Boolean);
    images.forEach(imgUrl => {
      const thumb = document.createElement('img');
      thumb.src = imgUrl;
      thumb.className = 'thumb-img' + (imgUrl === product.image ? ' active' : '');
      thumb.style.opacity = '1';
      thumb.style.border = '1px solid #334155';
      thumb.onclick = () => {
        mainImg.src = imgUrl;
        document.querySelectorAll('.thumb-grid img').forEach(t => t.style.borderColor = '#334155');
        thumb.style.borderColor = '#3b82f6';
      };
      thumbGrid.appendChild(thumb);
    });

    // Sizes
    if(product.sizes && product.sizes.length > 0) {
      sizeSection.style.display = 'block';
      sizeSelector.innerHTML = product.sizes.map(size => `
        <label class="size-option" style="display:inline-flex; align-items:center; gap:5px; margin-right:10px; cursor:pointer; background:#1e293b; padding:5px 10px; border-radius:5px; border:1px solid #334155; color:white;">
          <input type="checkbox" name="product-size" value="${size}" style="cursor:pointer;">
          <span>${size}</span>
        </label>
      `).join('');
    } else {
      sizeSection.style.display = 'none';
    }

    // Related Products
    const related = (products[category] || [])
      .filter(p => p.id !== product.id && p.subcategory === product.subcategory)
      .slice(0, 4);
    
    relatedGrid.innerHTML = related.map(p => `
      <div class="related-item" onclick="openProductDetails('${p.id}', '${category}')">
        <img src="${p.image || 'https://picsum.photos/300/200'}" alt="${p.name}">
        <h4>${p.name}</h4>
        <p>Ksh ${p.price}</p>
      </div>
    `).join('');

    // Add to Cart from modal
    addToCartBtn.onclick = () => {
      const selectedSizes = Array.from(document.querySelectorAll('input[name="product-size"]:checked')).map(cb => cb.value);
      const productToAdd = {...product, selectedSizes};
      DataManager.addToCart(productToAdd);
      showToast(`${product.name} added to cart!`);
      updateCartBadge();
      
      // Close modal after delay
      setTimeout(() => {
        closeProductDetails();
      }, 1000);
    };

    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  };

  window.closeProductDetails = function() {
    document.getElementById('productDetailsModal').style.display = 'none';
    document.body.style.overflow = 'auto';
  };

  window.showToast = function(msg) {
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toast-msg');
    toastMsg.innerText = msg;
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(100px)';
    }, 3000);
  };
</script>
</body>
</html>
