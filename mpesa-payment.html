<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daimara Stores | M-Pesa Payment</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>


:root{
  --primary:#e99d11;
  --primary-dark:#d97706;
  --dark:#0a0a0a;
  --darker:#1a1a1a;
  --card:#ffffff;
  --text:#1f2937;
  --success:#16a34a;
  --border:#e5e7eb;
  --shadow:0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#1F2937;
  min-height:100vh;
  font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  color:var(--text);
  line-height:1.6;
  display:flex;
  flex-direction:column;
  padding-bottom:80px;
}


/* M-PESA LOGO */
.m-pesa{
  width:100%;
  max-width:280px;
  margin: 2rem auto;
  animation:fadeIn 0.5s ease;
  position: relative;
}

.m-pesa img{
  width:100%;
  height:auto;
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(-20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* PAYMENT CARD */
.payment-card{
  background:var(--card);
  width: 95%;
  max-width: 600px;
  border-radius:12px;
  padding: 1.5rem;
  box-shadow:0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
  animation:slideUp 0.5s ease 0.1s both;
  margin: 2rem auto;
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ORDER SUMMARY */
.order-summary{
  background:#f9fafb;
  padding:1.25rem;
  border-radius:12px;
  margin-bottom:1.5rem;
  border:1px solid var(--border);
  width: 100%;
}

.order-summary h3{
  font-size:0.875rem;
  text-transform:uppercase;
  letter-spacing:0.05em;
  color:#6b7280;
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  gap:0.5rem;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0.75rem 0;
  border-bottom:1px solid var(--border);
  font-size:0.9375rem;
}

.summary-row:last-child{
  border-bottom:none;
  padding-bottom:0;
}

.summary-row:first-child{
  padding-top:0;
}

.summary-label{
  color:#6b7280;
  font-weight:500;
}

.summary-value{
  font-weight:700;
  color:var(--text);
}

.summary-value.amount{
  color:var(--primary);
  font-size:1.25rem;
}

/* PHONE INPUT */
.input-group{
  margin-bottom:1.5rem;
  width: 100%;
}

.input-group label{
  display:block;
  margin-bottom:0.5rem;
  font-weight:600;
  color:var(--text);
  font-size:0.9375rem;
}

.input-wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.input-wrapper i{
  position:absolute;
  left:1rem;
  color:#6b7280;
  font-size:1.125rem;
}

input[type="tel"]{
  width:100%;
  padding:1rem 1rem 1rem 3rem;
  border:2px solid var(--border);
  border-radius:12px;
  font-size:1rem;
  font-family:inherit;
  transition:all 0.3s;
  background:white;
}

input[type="tel"]:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(233,157,17,0.1);
}

input[type="tel"]::placeholder{
  color:#9ca3af;
}

/* PAY BUTTON */
.pay-btn{
  padding:1rem 1.5rem;
  background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color:#000;
  border:none;
  border-radius:12px;
  font-size:1.125rem;
  font-weight:700;
  cursor:pointer;
  transition:all 0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.75rem;
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:1.5rem;
}

.pay-btn:hover:not(:disabled):not(.disabled){
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(233,157,17,0.3);
}

.pay-btn:active:not(:disabled):not(.disabled){
  transform:translateY(0);
}

.pay-btn:disabled,
.pay-btn.disabled{
  background:#d1d5db !important;
  color:#9ca3af !important;
  cursor:not-allowed !important;
  transform:none !important;
  box-shadow:none !important;
  opacity:0.6 !important;
  pointer-events:none !important;
}

/* LOADING SPINNER */
.spinner{
  display:inline-block;
  width:20px;
  height:20px;
  border:3px solid rgba(0,0,0,0.3);
  border-radius:50%;
  border-top-color:transparent;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* NOTE */
.note{
  text-align:center;
  font-size:0.875rem;
  color:#6b7280;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.5rem;
}

.note i{
  font-size:1.5rem;
  color:var(--success);
}

/* SECURITY BADGES */
.security-badges{
  display:flex;
  justify-content:center;
  gap:1.5rem;
  margin-top:1.5rem;
  flex-wrap:wrap;
}

.badge{
  display:flex;
  align-items:center;
  gap:0.5rem;
  font-size:0.75rem;
  color:#6b7280;
  text-transform:uppercase;
  letter-spacing:0.05em;
}

.badge i{
  color:var(--success);
  font-size:1rem;
}

/* FOOTER */
.footer{
  background:var(--dark);
  color:#fff;
  padding:1rem;
  text-align:center;
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  z-index:100;
  font-size:0.875rem;
}

.footer p{
  color:var(--primary);
  margin:0;
}

/* TOAST NOTIFICATION */
.toast{
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%) translateY(-100px);
  background:var(--dark);
  color:white;
  padding:1rem 1.5rem;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  gap:0.75rem;
  opacity:0;
  transition:all 0.3s;
  z-index:2000;
  max-width:90vw;
  font-weight:500;
  border-left:4px solid var(--primary);
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

.toast.success{
  border-left-color:var(--success);
}

.toast.error{
  border-left-color:var(--danger);
}

/* RESPONSIVE BREAKPOINTS */
@media (max-width:640px){
  .container{
    margin-top:70px;
    padding:1rem;
  }
  
  .m-pesa{
    max-width:200px;
  }
  
  .payment-card{
    border-radius:16px;
    padding:1.25rem;
  }
  
  .pay-btn{
    font-size:1rem;
    padding:0.875rem 1.25rem;
  }
}

/* TOUCH OPTIMIZATIONS */
@media (hover:none) and (pointer:coarse){
  .pay-btn{
    min-height:56px;
  }
  
  input[type="tel"]{
    font-size:16px; /* Prevents zoom on iOS */
  }
}

/* REDUCED MOTION */
@media (prefers-reduced-motion:reduce){
  *{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}

/* ACCESSIBILITY */
.sr-only{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border-width:0;
}


    /* RESPONSIVE BREAKPOINTS */
    @media (max-width: 768px) {
    .container{
    margin-top:-32px;
    padding:1rem;
    
    margin-left: 28px;
  }
  
  .m-pesa{
    max-width:200px;
     margin-left: 2px;
  }
  
  .payment-card{
    border-radius:16px;
    padding:1.25rem;
    margin-left: 28px;
  }
  
.order-summary{
  margin-left: 2px;
}

.input-group{
  margin-left: 2px;
}

  .pay-btn{
    font-size:1rem;
    padding:0.875rem 1.25rem;

  }

<body>



<!-- MAIN CONTENT -->
<main class="container">
  <!-- M-PESA LOGO -->
 

  <!-- PAYMENT CARD -->
  <div class="payment-card">
 <div class="m-pesa">
    <img src="mpesa.png" alt="M-Pesa Logo">
  </div>

    <!-- ORDER SUMMARY -->
    <div class="order-summary">
      <h3><i class="fas fa-receipt"></i> Order Summary</h3>
      <div class="summary-row">
        <span class="summary-label">Order ID</span>
        <span class="summary-value" id="orderId">—</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Amount to Pay</span>
        <span class="summary-value amount">KES <span id="amount">0</span></span>
      </div>
    </div>

    <!-- PHONE INPUT -->
    <div class="input-group">
      <label for="phone">
        <i class="fas fa-mobile-alt"></i> M-Pesa Phone Number
      </label>
      <div class="input-wrapper">
        <i class="fas fa-phone"></i>
        <input 
          type="tel" 
          id="phone" 
          placeholder="2547XXXXXXXX" 
          required
          inputmode="tel"
          autocomplete="tel"
        >
      </div>
    </div>

    <!-- PAY BUTTON -->
    <button onclick="payNow()" id="payButton" class="pay-btn-new" style="width: 100%; padding: 1rem 1.5rem; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #000; border: none; border-radius: 12px; font-size: 1.125rem; font-weight: 700; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1.5rem;">
      <i class="fas fa-mobile-alt"></i> Pay with M-Pesa
    </button>

    <!-- NOTE -->
    <div class="note">
      <i class="fas fa-info-circle"></i>
      <span>You will receive an M-Pesa STK prompt on your phone. Enter your PIN to complete payment.</span>
    </div>

    <!-- SECURITY BADGES -->
    <div class="security-badges">
      <div class="badge">
        <i class="fas fa-shield-alt"></i>
        <span>Secure Payment</span>
      </div>
      <div class="badge">
        <i class="fas fa-lock"></i>
        <span>256-bit SSL</span>
      </div>
      <div class="badge">
        <i class="fas fa-check-circle"></i>
        <span>Instant Confirmation</span>
      </div>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Daimara Stores. All rights reserved.</p>
</footer>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fas fa-info-circle"></i>
  <span id="toastMessage">Message</span>
</div>

<script src="data-manager.js"></script>




<script src="data-manager.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const amount = urlParams.get('amount') || '0';
const purpose = urlParams.get('purpose') || 'full-payment';
const orderId = urlParams.get('orderId') || ('ORD-' + Math.random().toString(36).substr(2, 9).toUpperCase());

document.getElementById('orderId').innerText = orderId;
document.getElementById('amount').innerText = parseFloat(amount).toLocaleString();

// AUTO-FILL PHONE: First from logged-in user profile, then from localStorage
const loggedInUser = DataManager.getCurrentUser();
const savedPhone = localStorage.getItem('customerPhone');

if (loggedInUser && loggedInUser.phone) {
  document.getElementById('phone').value = loggedInUser.phone;
} else if (savedPhone) {
  document.getElementById('phone').value = savedPhone;
}

function payNow(){
  const phone = document.getElementById('phone').value.trim();

  if(!phone){
    alert("Please enter phone number");
    return;
  }

  localStorage.setItem('customerPhone', phone);

  console.log('Initiating M-Pesa payment for', phone, 'Amount:', amount);
  
  // Simulate STK push
  alert("STK Push sent to " + phone + ". Please enter your PIN on your phone.");

  setTimeout(() => {
    alert("Payment successful! Thank you for shopping with Daimara Online Mart.");
    
    // Redirect back to checkout with success params
    window.location.href = `checkout.html?paymentSuccess=true&purpose=${purpose}&orderId=${orderId}`;
  }, 2000);
}
</script>

</body>
</html>
