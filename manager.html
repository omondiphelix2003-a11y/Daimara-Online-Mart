<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daimara Stores | Operations Manager</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --primary:#3b82f6;
  --accent:#1e40af;
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --muted:#94a3b8;
  --border:rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; }
body{
  margin:0;
  font-family:'Inter', system-ui, -apple-system, sans-serif;
  background:var(--bg);
  color: var(--text);
  line-height: 1.5;
}

.topbar{
  background:var(--card);
  color: var(--text);
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar h1{margin:0;font-size:18px; color: var(--primary);}

.container{padding:24px; max-width: 1200px; margin: 0 auto;}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap:20px;
  margin-bottom:32px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:24px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.card h3 { color: var(--muted); font-size: 13px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.card strong { font-size: 24px; color: var(--text); display: block; }

.section-title { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--text); }

.table-container {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 32px;
}

.table{
  width:100%;
  border-collapse:collapse;
  text-align:left;
}

.table th{
  background: rgba(0,0,0,0.2);
  padding:14px 20px;
  font-size: 12px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}

.table td{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  font-size: 14px;
}

.status{
  padding:4px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:bold;
}

.status.active{background:rgba(16, 185, 129, 0.1); color: #10b981;}
.status.pending{background:rgba(245, 158, 11, 0.1); color: #f59e0b;}

.view-btn{
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
  background:var(--primary);
  color:white;
  font-weight: 600;
  font-size: 12px;
  transition: opacity 0.2s;
}

.view-btn:hover { opacity: 0.9; }

.monitor-card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 12px;
}

iframe{
  width:100%;
  height:500px;
  border:none;
  border-radius:8px;
  background: var(--bg);
}

@media (max-width: 768px) {
  .topbar { padding: 12px 16px; }
  .topbar h1 { font-size: 16px; }
  .container { padding: 16px; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .card { padding: 16px; }
  .card strong { font-size: 18px; }
  
  /* Stack table on small screens */
  .table-container { border: none; background: transparent; }
  .table thead { display: none; }
  .table, .table tbody, .table tr, .table td { display: block; width: 100%; }
  .table tr { background: var(--card); border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); padding: 8px; }
  .table td { border: none; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
  .table td::before { content: attr(data-label); font-weight: 600; color: var(--muted); font-size: 12px; }
  iframe { height: 400px; }
}

@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

<div class="topbar">
  <h1><i class="fas fa-chart-line"></i> Operations Manager</h1>
  <button onclick="location.href='index.html'" style="background:none; border:none; color:var(--muted); cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
</div>

<div class="container">

  <!-- REAL TIME SUMMARY -->
  <div class="grid">
    <div class="card">
      <h3>Warehouse Stock</h3>
      <strong>2,450 Units</strong>
    </div>
    <div class="card">
      <h3>Active Orders</h3>
      <strong>42 Processing</strong>
    </div>
    <div class="card">
      <h3>In Transit</h3>
      <strong>18 Packages</strong>
    </div>
    <div class="card">
      <h3>Completed</h3>
      <strong>31 Today</strong>
    </div>
  </div>

  <!-- TEAM MANAGEMENT -->
  <h2 class="section-title"><i class="fas fa-users"></i> Operations Team</h2>
  <div class="table-container">
    <table class="table">
      <thead>
        <tr>
          <th>Department</th>
          <th>Role</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td data-label="Department">Warehouse</td>
          <td data-label="Role">Operators</td>
          <td data-label="Status"><span class="status active">Active</span></td>
          <td data-label="Action"><button class="view-btn" onclick="loadPanel('Daimara-operator.html')">View Panel</button></td>
        </tr>
        <tr>
          <td data-label="Department">Logistics</td>
          <td data-label="Role">Delivery</td>
          <td data-label="Status"><span class="status active">Active</span></td>
          <td data-label="Action"><button class="view-btn" onclick="loadPanel('Delivery services.html')">View Panel</button></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- LIVE OPERATIONS VIEW -->
  <h2 class="section-title"><i class="fas fa-desktop"></i> Live Monitor</h2>
  <div class="monitor-card">
    <iframe id="panelViewer" src="" title="Operations Monitor"></iframe>
  </div>

</div>

<script>
function loadPanel(panel){
  const viewer = document.getElementById('panelViewer');
  viewer.style.opacity = '0.5';
  setTimeout(() => {
    viewer.src = panel;
    viewer.style.opacity = '1';
  }, 200);
}
</script>

</body>
</html>
