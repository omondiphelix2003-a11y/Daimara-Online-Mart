<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daimara Stores | Delivery Services</title>
<base target="_self">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
:root{
  --primary:#3b82f6;
  --accent:#1e40af;
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --muted:#94a3b8;
  --border:rgba(255, 255, 255, 0.1);
  --success:#22c55e;
  --danger:#ef4444;
  --sidebar-width: 260px;
}

* { box-sizing: border-box; }
body{
  margin:0;
  font-family:'Inter', system-ui, -apple-system, sans-serif;
  background:var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
}

/* Sidebar Styles */
.sidebar {
  width: var(--sidebar-width);
  background: #041344;
  color: white;
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  z-index: 1000;
  transition: transform 0.3s ease;
  border-right: 1px solid var(--border);
}

.sidebar-header {
  padding: 24px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}

.sidebar-nav {
  padding: 20px 0;
  flex: 1;
}

.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  color: var(--text);
  text-decoration: none;
  transition: all 0.2s;
}

.sidebar-nav a:hover {
  background: rgba(255,255,255,0.05);
  color: var(--primary);
}

/* Main Content Layout */
.main-wrapper {
  flex: 1;
  margin-left: var(--sidebar-width);
  display: flex;
  flex-direction: column;
  min-width: 0;
  transition: margin 0.3s ease;
}

.topbar{
  background:var(--card);
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
}

.container{padding:24px; max-width: 1200px; margin: 0 auto; width: 100%;}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap:20px;
  margin-bottom:32px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:24px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.card h3 { color: var(--muted); font-size: 13px; margin-bottom: 8px; text-transform: uppercase; }
.card strong { font-size: 24px; display: block; }

.section-title { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; margin-top: 32px; }

.table-container {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 24px;
}

.table{
  width:100%;
  border-collapse:collapse;
  text-align:left;
}

.table th{
  background: rgba(0,0,0,0.2);
  padding:14px 20px;
  font-size: 12px;
  text-transform: uppercase;
  color: var(--muted);
}

.table td{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  font-size: 14px;
  color: var(--text);
}

.action-btn{
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
  color:white;
  font-weight: 600;
  font-size: 12px;
}

.dispatch{background:var(--primary)}
.delivered{background:var(--success)}

#reader{
  width:100%;
  max-width:400px;
  margin: 20px auto;
  border-radius: 12px;
  overflow: hidden;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-content {
  background: var(--card);
  padding: 24px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--border);
}

/* Receipt Styles */
.receipt { background: white; color: #1e293b; padding: 24px; border-radius: 12px; }
.receipt h1 { color: #0f172a; font-size: 20px; margin-bottom: 8px; text-align: center; }
.receipt-info { font-size: 13px; line-height: 1.6; border-bottom: 2px dashed #e2e8f0; padding-bottom: 16px; margin-bottom: 16px; }

@media (max-width: 1024px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-wrapper { margin-left: 0; }
  .menu-toggle { display: block; }
}

@media (max-width: 768px) {
  .container { padding: 16px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .card { padding: 16px; }
  .card strong { font-size: 18px; }
  
  .table-container { border: none; background: transparent; }
  .table thead { display: none; }
  .table tr { display: block; background: var(--card); border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); padding: 8px; }
  .table td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 8px 12px; }
  .table td::before { content: attr(data-label); font-weight: 600; color: var(--muted); font-size: 12px; }
}

@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2 style="font-size: 20px; color: var(--primary);">DAIMARA</h2>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="#" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</a>
    <a href="client end money valt.html"><i class="fas fa-wallet"></i> VaultPro</a>
    <a href="contact.html"><i class="fas fa-headset"></i> Support</a>
    <a href="#" onclick="adminLogout()" style="color:var(--danger); margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </nav>
</aside>

<div class="main-wrapper">
  <header class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <h1 style="font-size: 18px;">Delivery Services</h1>
    <button onclick="refreshPlatformEarnings()" class="btn btn-danger" style="background:var(--danger); padding: 8px 12px;">Reset</button>
  </header>

  <div id="details-modal" class="modal">
    <div class="modal-content">
      <div id="modal-body"></div>
      <button onclick="closeModal()" class="action-btn" style="width:100%; margin-top:16px; background:var(--bg);">Close</button>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <h3>Ready</h3>
        <strong id="summary-ready">0</strong>
      </div>
      <div class="card">
        <h3>In Transit</h3>
        <strong id="summary-out">0</strong>
      </div>
      <div class="card">
        <h3>Delivered</h3>
        <strong id="summary-delivered">0</strong>
      </div>
      <div class="card" style="border-color: var(--success);">
        <h3 style="color: var(--success);">Earnings</h3>
        <strong id="summary-profit" style="color: var(--success);">KES 0</strong>
      </div>
    </div>

    <h2 class="section-title"><i class="fas fa-truck-loading"></i> Pending Dispatch</h2>
    <div class="table-container">
      <table class="table" id="dispatch-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Client</th>
            <th>Destination</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="dispatch-tbody"></tbody>
      </table>
    </div>

    <h2 class="section-title"><i class="fas fa-qrcode"></i> Delivery Confirmation</h2>
    <div class="card" style="text-align: center;">
      <p style="color: var(--muted); margin-bottom: 16px;">Scan client QR code to verify delivery</p>
      <div id="reader"></div>
      <div id="result" style="margin-top: 16px; font-weight: bold; color: var(--primary);">Ready for scan...</div>
    </div>
  </div>
</div>

<script src="data-manager.js"></script>
<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeModal() { document.getElementById('details-modal').style.display = 'none'; }
    function adminLogout() { DataManager.logout(); window.location.href = 'login.html'; }

    function refreshPlatformEarnings() {
      if (confirm("Reset all platform earnings to zero?")) {
        if (DataManager.resetPlatformEarnings().success) location.reload();
      }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const viewUserEmail = urlParams.get('viewUserEmail');

    function init() {
      const user = DataManager.getCurrentUser();
      if (!user) { window.location.href = "login.html"; return; }
      if (user.role !== 'delivery' && user.role !== 'admin') { window.location.href = "index.html"; return; }
      
      renderDeliveryData();
      setInterval(renderDeliveryData, 30000);
      initScanner();
    }

    function renderDeliveryData() {
      const orders = DataManager.getScopedData('delivery_orders', [], viewUserEmail);
      const earnings = DataManager.getScopedData('delivery_earnings', { total: 0 }, viewUserEmail);
      const allGlobalOrders = DataManager.getAllOrders();
      
      const readyOrders = orders.filter(o => {
        if (o.status !== 'assigned' && o.status !== 'Packed') return false;
        const globalOrder = allGlobalOrders.find(go => go.id === o.id);
        if (!globalOrder) return true;
        const items = globalOrder.items || globalOrder.products || [];
        const assignedBy = globalOrder.assignedBy || [];
        return items.every(item => item.owner ? assignedBy.includes(item.owner) : true);
      });

      document.getElementById('summary-ready').innerText = readyOrders.length;
      document.getElementById('summary-out').innerText = orders.filter(o => o.status === 'out_for_delivery' || o.status === 'Dispatched').length;
      document.getElementById('summary-delivered').innerText = orders.filter(o => (o.status === 'delivered' || o.status === 'completed') && new Date(o.date).toLocaleDateString() === new Date().toLocaleDateString()).length;
      document.getElementById('summary-profit').innerText = 'KES ' + (earnings.total || 0).toLocaleString();

      const tbody = document.getElementById('dispatch-tbody');
      tbody.innerHTML = orders.filter(o => o.status !== 'delivered' && o.status !== 'completed').map(o => `
        <tr>
          <td data-label="Order ID"><strong>#${o.id.slice(-6)}</strong></td>
          <td data-label="Client">${o.customerName || 'Client'}</td>
          <td data-label="Destination">${o.deliveryLocation || 'N/A'}</td>
          <td data-label="Status">${o.status}</td>
          <td data-label="Action">
            ${(o.status === 'assigned' || o.status === 'Packed') ? 
              `<button class="action-btn dispatch" onclick="showDispatchModal('${o.id}')">Review & Dispatch</button>` : 
              `<button class="action-btn delivered" onclick="completeDelivery('${o.id}')">Delivered</button>`}
          </td>
        </tr>
      `).join('') || '<tr><td colspan="5" style="text-align:center; padding: 20px;">No pending deliveries</td></tr>';
    }

    function showDispatchModal(orderId) {
      const globalOrders = DataManager.getAllOrders();
      const order = globalOrders.find(o => o.id === orderId);
      if (!order) return;

      const body = document.getElementById('modal-body');
      body.innerHTML = `
        <div class="receipt">
          <h1>Order #${order.id.slice(-8)}</h1>
          <div class="receipt-info">
            <p><strong>Customer:</strong> ${order.customerName}</p>
            <p><strong>Phone:</strong> ${order.customerPhone}</p>
            <p><strong>Location:</strong> ${order.deliveryLocation}</p>
          </div>
          <button class="action-btn dispatch" style="width:100%; padding:14px;" onclick="dispatchOrder('${orderId}')">Confirm Dispatch</button>
        </div>
      `;
      document.getElementById('details-modal').style.display = 'flex';
    }

    function dispatchOrder(id) {
      if (DataManager.updateOrderStatus(id, 'out_for_delivery').success) {
        closeModal();
        renderDeliveryData();
      }
    }

    function completeDelivery(id) {
      if (confirm("Mark order as delivered?")) {
        if (DataManager.updateOrderStatus(id, 'delivered').success) renderDeliveryData();
      }
    }

    function initScanner() {
      const html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
        document.getElementById('result').innerText = "Scanned: " + decodedText;
        if (DataManager.updateOrderStatus(decodedText, 'delivered').success) {
          alert("Delivery confirmed via scan!");
          renderDeliveryData();
        }
      }).catch(err => console.warn(err));
    }

    init();
</script>
</body>
</html>
