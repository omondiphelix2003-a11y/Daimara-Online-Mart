<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daimara Stores | Agent Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #3b82f6;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; overflow-x: auto; }
    .container { max-width: 800px; margin: 0 auto; min-width: 320px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .agent-info { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
    .balance-card { background: linear-gradient(135deg, #1e40af, #3b82f6); padding: 30px; border-radius: 16px; text-align: center; margin-bottom: 30px; }
    .balance-amount { font-size: 36px; font-weight: 800; margin: 10px 0; }
    
    .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .action-btn { background: var(--card); border: 1px solid var(--border); color: white; padding: 20px; border-radius: 16px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.3s; }
    .action-btn:hover { background: #334155; transform: translateY(-2px); }
    .action-btn i { font-size: 24px; color: var(--primary); }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: var(--card); padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; }
    button.submit-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    .logs-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
    .log-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .log-type { font-weight: 600; }
    .log-amount-credit { color: var(--success); }
    .log-amount-debit { color: var(--danger); }

    @media (max-width: 480px) {
      .agent-info { padding: 15px; }
      .agent-info > div { flex-direction: column; gap: 10px; }
      .agent-info h3 { font-size: 16px; }
      .balance-amount { font-size: 28px; }
      .actions-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Agent Portal</h1>
      <button onclick="location.href='index.html'" style="background:none; border:none; color:var(--muted); cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Exit Portal</button>
    </header>

    <div class="agent-info">
      <div style="display:flex; justify-content:space-between;">
        <div>
          <p style="color:var(--muted); font-size:12px;">AGENT NAME</p>
          <h3 id="display-biz-name">Loading...</h3>
        </div>
        <div style="text-align:right;">
          <p style="color:var(--muted); font-size:12px;">AGENT NUMBER</p>
          <h3 id="display-agent-no" style="color:var(--primary);">...</h3>
        </div>
      </div>
    </div>

    <div class="balance-card">
      <p style="opacity:0.8;">Available Float Balance</p>
      <div class="balance-amount">KSH <span id="float-balance">0.00</span></div>
      <p style="font-size:12px; opacity:0.6;">Daimara Stores Verified Agent</p>
    </div>

    <div class="actions-grid">
      <button class="action-btn" onclick="openAction('deposit')">
        <i class="fas fa-hand-holding-usd"></i>
        <span>Process Deposit</span>
      </button>
      <button class="action-btn" onclick="openAction('withdraw')">
        <i class="fas fa-money-bill-wave"></i>
        <span>Process Withdrawal</span>
      </button>
      <button class="action-btn" onclick="openAction('transfer')">
        <i class="fas fa-exchange-alt"></i>
        <span>Transfer to Vault</span>
      </button>
      <button class="action-btn" onclick="openAction('logs')">
        <i class="fas fa-history"></i>
        <span>Transaction Logs</span>
      </button>
    </div>

    <div class="logs-card" id="logs-section" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3>Transaction Logs</h3>
        <button onclick="document.getElementById('logs-section').style.display='none'" style="background:none; border:none; color:var(--muted); cursor:pointer;">&times;</button>
      </div>
      <div id="logs-list"></div>
    </div>
  </div>

  <!-- ACTION MODAL -->
  <div id="action-modal" class="modal">
    <div class="modal-content">
      <h2 id="modal-title" style="margin-bottom:20px;">Action</h2>
      <form onsubmit="handleAction(event)">
        <div id="modal-fields"></div>
        <input type="password" id="auth-pin" required maxlength="4" placeholder="Enter Portal PIN" style="text-align:center; letter-spacing:0.5em;">
        <div style="text-align: right; margin-bottom: 10px;">
          <a href="#" onclick="openForgotPin()" style="color: var(--primary); font-size: 12px; text-decoration: none;">Forgot PIN?</a>
        </div>
        <button type="submit" class="submit-btn">Confirm Transaction</button>
        <button type="button" onclick="closeModal()" style="width:100%; background:none; color:var(--muted); border:none; margin-top:10px; cursor:pointer;">Cancel</button>
      </form>
    </div>
  </div>

  <!-- FORGOT PIN MODAL -->
  <div id="forgot-pin-modal" class="modal">
    <div class="modal-content">
      <h2>Reset Portal PIN</h2>
      <p style="color:var(--muted); font-size:12px; margin-bottom:15px;">Enter your ID number used during registration to set a new PIN.</p>
      <form onsubmit="handleResetPin(event)">
        <input type="text" id="reset-id-num" required placeholder="Registration ID Number">
        <input type="password" id="new-pin" required maxlength="4" placeholder="Enter New 4-Digit PIN" style="text-align:center; letter-spacing:0.5em;">
        <button type="submit" class="submit-btn">Reset PIN</button>
        <button type="button" onclick="closeForgotModal()" style="width:100%; background:none; color:var(--muted); border:none; margin-top:10px; cursor:pointer;">Cancel</button>
      </form>
    </div>
  </div>

  <script src="data-manager.js"></script>
  <script>
    let currentAction = '';
    let agentData = null;

    function init() {
      const user = DataManager.getCurrentUser();
      if (!user) { location.href = 'index.html'; return; }

      agentData = DataManager.getAgentByUserId(user.id);

      if (!agentData || agentData.status !== 'approved') {
        alert("Unauthorized. Access denied.");
        location.href = 'index.html';
        return;
      }

      document.getElementById('display-biz-name').innerText = agentData.businessName || agentData.details?.company || "Agent";
      document.getElementById('display-agent-no').innerText = agentData.agentNumber;
      refreshBalance();
    }

    function refreshBalance() {
      const balance = DataManager.getAgentFloat(agentData.agentNumber);
      document.getElementById('float-balance').innerText = balance.toLocaleString(undefined, {minimumFractionDigits:2});
    }

    function openAction(type) {
      currentAction = type;
      const modal = document.getElementById('action-modal');
      const title = document.getElementById('modal-title');
      const fields = document.getElementById('modal-fields');
      fields.innerHTML = '';
      
      if (type === 'logs') {
        renderLogs();
        document.getElementById('logs-section').style.display = 'block';
        return;
      }

      modal.style.display = 'flex';
      
      if (type === 'deposit') {
        title.innerText = 'Process Deposit';
        fields.innerHTML = `
          <input type="tel" id="client-phone" required placeholder="Client Phone Number">
          <input type="number" id="tx-amount" required placeholder="Amount to Deposit">
        `;
      } else if (type === 'withdraw') {
        title.innerText = 'Process Withdrawal';
        fields.innerHTML = `
          <p style="font-size:12px; color:var(--muted); margin-bottom:10px;">Select from client withdrawal requests</p>
          <div id="withdrawal-requests" style="max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
        `;
        renderWithdrawalRequests();
      } else if (type === 'transfer') {
        title.innerText = 'Transfer to VaultPro';
        fields.innerHTML = `
          <input type="number" id="tx-amount" required placeholder="Amount to Transfer">
          <p style="font-size:12px; color:var(--muted);">Transfer float funds back to your VaultPro account</p>
        `;
      }
    }

    function closeModal() {
      document.getElementById('action-modal').style.display = 'none';
    }

    function openForgotPin() {
      closeModal();
      document.getElementById('forgot-pin-modal').style.display = 'flex';
    }

    function closeForgotModal() {
      document.getElementById('forgot-pin-modal').style.display = 'none';
    }

    function handleResetPin(e) {
      e.preventDefault();
      const idNum = document.getElementById('reset-id-num').value.trim();
      const newPin = document.getElementById('new-pin').value;
      
      if (newPin.length !== 4) { alert("PIN must be 4 digits"); return; }

      const res = DataManager.resetAgentPin(agentData.agentNumber, idNum, newPin);
      if (res.success) {
        alert("PIN Reset Successful! You can now use your new PIN.");
        // Reload agent data to get new pin
        const user = DataManager.getCurrentUser();
        agentData = DataManager.getAgentByUserId(user.id);
        closeForgotModal();
      } else {
        alert("Error: " + res.message);
      }
    }

    function handleAction(e) {
      e.preventDefault();
      const pin = document.getElementById('auth-pin').value;
      // Agent pin might be in details or root
      const agentPin = agentData.pin || agentData.details?.pin || '1234'; 
      if (pin !== agentPin) {
        alert("Incorrect Portal PIN!");
        return;
      }

      const currentFloat = DataManager.getAgentFloat(agentData.agentNumber);

      if (currentAction === 'deposit') {
        const phone = document.getElementById('client-phone').value;
        const amount = parseFloat(document.getElementById('tx-amount').value);

        if (isNaN(amount) || amount <= 0) { alert("Invalid amount!"); return; }
        
        if (currentFloat <= 0) { alert("Float balance is zero! Deposit cannot be processed."); return; }
        if (currentFloat < amount) { alert("Insufficient float balance to process this deposit!"); return; }

        // Logic: Agent Float Decr, Client VaultPro Incr
        const users = DataManager.getAllUsers() || [];
        const client = users.find(u => u.phone === phone);
        if (!client) { alert("Client phone number not registered!"); return; }

        // Update Client Vault
        DataManager.updateVaultBalance(client.id, amount, `Deposit via Agent ${agentData.agentNumber}`);

        // Update Agent Float
        DataManager.updateAgentFloat(agentData.agentNumber, -amount, `Deposit to ${phone}`);
        
        alert("Deposit processed successfully!");

      } else if (currentAction === 'transfer') {
        const amount = parseFloat(document.getElementById('tx-amount').value);
        if (isNaN(amount) || amount <= 0) { alert("Invalid amount!"); return; }
        
        if (currentFloat <= 0) { alert("Float balance is zero! Transfer cannot be processed."); return; }
        if (currentFloat < amount) { alert("Insufficient float balance to process this transfer!"); return; }

        // Logic: Agent Float Decr, Agent's own VaultPro Incr
        DataManager.updateVaultBalance(agentData.userId, amount, `Float Transfer from Agent Portal`);
        DataManager.updateAgentFloat(agentData.agentNumber, -amount, `Transfer to VaultPro`);

        alert("Transfer completed!");
      }

      refreshBalance();
      closeModal();
    }

    function renderWithdrawalRequests() {
      const container = document.getElementById('withdrawal-requests');
      const reqs = DataManager.getWithdrawalRequests(agentData.agentNumber).filter(r => r.status === 'pending');
      
      if (reqs.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:10px; color:var(--muted);">No pending requests found.</p>';
      } else {
        container.innerHTML = reqs.map(r => `
          <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
              <span>${r.clientName}<br><small style="color:var(--muted);">${r.clientPhone}</small></span>
              <span style="font-weight:bold; color:var(--primary);">KSH ${r.amount.toLocaleString()}</span>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
              <button onclick="handleWithdrawalRequest('${r.id}', 'accepted')" style="padding:8px; background:var(--success); color:white; border:none; border-radius:6px; cursor:pointer;">Accept</button>
              <button onclick="handleWithdrawalRequest('${r.id}', 'declined')" style="padding:8px; background:var(--danger); color:white; border:none; border-radius:6px; cursor:pointer;">Decline</button>
            </div>
          </div>
        `).join('');
      }
      
      // Still keep manual input just in case
      container.innerHTML += `
        <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:10px;">
          <p style="font-size:11px; color:var(--muted); margin-bottom:5px;">Or process manual withdrawal:</p>
          <input type="tel" id="withdraw-client-phone" placeholder="Enter Client Phone">
          <input type="number" id="withdraw-amount" placeholder="Enter Requested Amount">
          <button type="button" onclick="processManualWithdrawal()" style="width:100%; padding:8px; background:#334155; color:white; border:none; border-radius:4px; font-size:12px; cursor:pointer;">Process Manually</button>
        </div>
      `;
    }

    function handleWithdrawalRequest(reqId, status) {
      const pin = prompt("Enter Portal PIN to confirm:");
      const agentPin = agentData.pin || agentData.details?.pin || '1234';
      if (pin !== agentPin) { alert("Incorrect Portal PIN!"); return; }

      const res = DataManager.updateWithdrawalStatus(reqId, status);
      if (res.success) {
        alert(`Withdrawal ${status} successfully!`);
        refreshBalance();
        renderWithdrawalRequests();
        if (status === 'accepted') closeModal();
      } else {
        alert("Error: " + res.message);
      }
    }

    function processManualWithdrawal() {
      const pin = document.getElementById('auth-pin').value;
      const agentPin = agentData.pin || agentData.details?.pin || '1234';
      if (pin !== agentPin) { alert("Incorrect Portal PIN!"); return; }

      const phone = document.getElementById('withdraw-client-phone').value;
      const amount = parseFloat(document.getElementById('withdraw-amount').value);
      
      if (isNaN(amount) || amount <= 0) { alert("Invalid amount!"); return; }

      const users = DataManager.getAllUsers() || [];
      const client = users.find(u => u.phone === phone);
      if (!client) { alert("Client not found!"); return; }

      const clientBalance = DataManager.getVaultBalance(client.id);
      if (clientBalance < amount) { alert("Client has insufficient funds in VaultPro!"); return; }

      // Manual withdrawal:
      // 1. Decrease client balance
      DataManager.updateVaultBalance(client.id, -amount, `Manual Withdrawal via Agent ${agentData.agentNumber}`);
      
      // 2. Decrease agent float (per user request: "when he accepts the float amount decreases")
      DataManager.updateAgentFloat(agentData.agentNumber, -amount, `Manual Withdrawal for ${phone}`);

      alert("Withdrawal processed! You can now give the client cash.");
      refreshBalance();
      closeModal();
    }

    function renderLogs() {
      const logs = DataManager.getAgentTransactions(agentData.agentNumber);
      const list = document.getElementById('logs-list');
      list.innerHTML = logs.map(l => `
        <div class="log-item">
          <div>
            <div class="log-type">${l.description}</div>
            <div style="font-size:11px; color:var(--muted);">${new Date(l.timestamp).toLocaleString()}</div>
          </div>
          <div style="text-align:right;">
            <div class="log-amount-${l.amount >= 0 ? 'credit' : 'debit'}">
              ${l.amount >= 0 ? '+' : '-'} KSH ${Math.abs(l.amount).toLocaleString()}
            </div>
            <div style="font-size:11px; color:var(--muted);">Bal: KSH ${l.balance.toLocaleString()}</div>
          </div>
        </div>
      `).join('') || '<p style="text-align:center; color:var(--muted);">No transactions yet.</p>';
    }

    init();
  </script>
</body>
</html>
