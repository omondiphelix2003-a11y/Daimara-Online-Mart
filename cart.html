<script>
    function updateCartBadge() {
        const cartItems = DataManager.getCart();
        const totalQty = cartItems.reduce((acc, item) => acc + (item.qty || 1), 0);
        const badge = document.getElementById('cartBadge');
        if (badge) {
            if (totalQty > 0) {
                badge.innerText = totalQty;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }
    }

    let cart = DataManager.getCart();
    let listenersAttached = false;

    function renderCart() {
        const cartItems = document.getElementById('cart-items');
        cartItems.innerHTML = '';

        if (cart.length === 0) {
            cartItems.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">Your cart is empty. <a href="store.html" style="color:#3b82f6;">Continue shopping</a></p>';
            document.getElementById('total').textContent = '0';
            return;
        }

        let total = 0;
        cart.forEach((item) => {
            const subtotal = item.price * (item.qty || 1);
            total += subtotal;

            const div = document.createElement('div');
            div.className = 'cart-item-card';
            div.setAttribute('data-product-id', item.id);
            div.innerHTML = `
                <div class="cart-item-image">
                    <img src="${item.image || 'https://picsum.photos/100/100'}" alt="${item.name}">
                </div>
                <div class="cart-item-details">
                    <h3>${item.name}</h3>
                    <p class="price">Ksh ${item.price.toLocaleString()}</p>
                    <div class="quantity-control">
                        <button class="qty-btn decrease-btn">-</button>
                        <span class="qty-display">${item.qty || 1}</span>
                        <button class="qty-btn increase-btn">+</button>
                    </div>
                </div>
                <div class="cart-item-action">
                    <p class="subtotal">Ksh ${subtotal.toLocaleString()}</p>
                    <button class="remove-btn">Remove</button>
                </div>
            `;
            cartItems.appendChild(div);
        });
        document.getElementById('total').textContent = total.toLocaleString();
        updateCartBadge();
        setupCartEventListeners();
    }

    function setupCartEventListeners() {
        if (listenersAttached) return;
        document.getElementById('cart-items').addEventListener('click', (e) => {
            const card = e.target.closest('.cart-item-card');
            if (!card) return;
            const pid = card.getAttribute('data-product-id');
            if (e.target.classList.contains('increase-btn')) updateQty(pid, 1);
            else if (e.target.classList.contains('decrease-btn')) updateQty(pid, -1);
            else if (e.target.classList.contains('remove-btn')) remove(pid);
        });
        listenersAttached = true;
    }

    function updateQty(pid, change) {
        const item = cart.find(i => i.id === pid);
        if (!item) return;
        const newQty = (item.qty || 1) + change;
        if (newQty < 1) return;
        if (DataManager.updateCartQuantity(pid, newQty).success) {
            cart = DataManager.getCart();
            renderCart();
        }
    }

    function remove(pid) {
        if (DataManager.removeFromCart(pid).success) {
            cart = DataManager.getCart();
            renderCart();
        }
    }

    document.getElementById('checkout').addEventListener('click', (e) => {
        if (cart.length === 0) { e.preventDefault(); alert('Cart is empty!'); return; }
        if (!DataManager.getCurrentUser()) { e.preventDefault(); alert('Please login to proceed'); window.location.href='login.html'; }
    });

    // Slideshow
    let slideIndex = 0;
    function initSlideshow() {
        const campaign = DataManager.getAllCampaigns().filter(c => c.adType === 'slideshow' && c.targetPage === 'cart');
        const slider = document.getElementById('cart-slider');
        if (campaign.length > 0) {
            slider.innerHTML = campaign.map(c => `<div class="slide"><img src="${c.media}"></div>`).join('');
        }
        const slides = document.querySelectorAll('.slide');
        if (slides.length === 0) return;
        function show() {
            slides.forEach(s => s.style.display = 'none');
            slideIndex = (slideIndex + 1) > slides.length ? 1 : slideIndex + 1;
            slides[slideIndex-1].style.display = 'block';
            setTimeout(show, 3000);
        }
        show();
    }

    // Recommendations
    // Modal logic
    let selectedSize = null;
    window.openProductDetails = function(id) {
        const all = DataManager.getAllProducts();
        const flat = Object.keys(all).reduce((acc,k) => acc.concat(all[k]||[]), []);
        const product = flat.find(p => p.id === id);
        if (!product) return;

        selectedSize = null;
        const modal = document.getElementById('productDetailsModal');
        document.getElementById('modalTitle').innerText = product.name;
        document.getElementById('modalCategory').innerText = `${product.category} > ${product.subcategory || ''}`;
        document.getElementById('modalPrice').innerText = `Ksh ${product.price.toLocaleString()}`;
        document.getElementById('modalDesc').innerText = product.description || 'No description available.';
        document.getElementById('modalSupplier').innerText = product.supplier || 'Daimara Official';
        document.getElementById('modalSKU').innerText = product.sku || 'N/A';
        document.getElementById('modalMainImg').src = product.image || 'https://picsum.photos/400/400';

        const starsEl = document.getElementById('modalStars');
        if (starsEl) {
            starsEl.innerHTML = '';
            const rating = product.rating || 0;
            for (let i = 1; i <= 5; i++) {
                const isFull = i <= Math.floor(rating);
                const isHalf = !isFull && i <= Math.ceil(rating) && (rating % 1 !== 0);
                if (isFull) starsEl.innerHTML += '<i class="fas fa-star" style="color:#fbbf24; font-size:1.2rem; margin-right:5px;"></i>';
                else if (isHalf) starsEl.innerHTML += '<i class="fas fa-star-half-alt" style="color:#fbbf24; font-size:1.2rem; margin-right:5px;"></i>';
                else starsEl.innerHTML += '<i class="far fa-star" style="color:#fbbf24; font-size:1.2rem; margin-right:5px;"></i>';
            }
            if (rating > 0) starsEl.innerHTML += `<span style="color:#94a3b8; margin-left:10px; font-size:0.9rem;">(${rating.toFixed(1)})</span>`;
        }

        const thumbGrid = document.getElementById('modalThumbGrid');
        thumbGrid.innerHTML = '';
        const allPhotos = [product.image, ...(product.otherPhotos || [])].filter(Boolean);
        allPhotos.forEach((photo, idx) => {
            const img = document.createElement('img');
            img.src = photo;
            img.className = `thumb-img ${idx === 0 ? 'active' : ''}`;
            img.onclick = () => {
                document.getElementById('modalMainImg').src = photo;
                document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));
                img.classList.add('active');
            };
            thumbGrid.appendChild(img);
        });

        const sizeSection = document.getElementById('sizeSection');
        const sizesContainer = document.getElementById('modalSizes');
        if (product.sizes && product.sizes.length > 0) {
            sizeSection.style.display = 'block';
            sizesContainer.innerHTML = '';
            product.sizes.forEach(size => {
                const span = document.createElement('span');
                span.className = 'size-option';
                span.innerText = size;
                span.onclick = () => {
                    selectedSize = size;
                    document.querySelectorAll('.size-option').forEach(s => s.classList.remove('selected'));
                    span.classList.add('selected');
                };
                sizesContainer.appendChild(span);
            });
        } else {
            sizeSection.style.display = 'none';
        }

        const relatedGrid = document.getElementById('relatedGrid');
        const related = flat.filter(p => p.subcategory === product.subcategory && p.id !== product.id).slice(0, 4);
        relatedGrid.innerHTML = related.map(p => `
            <div class="product" onclick="openProductDetails('${p.id}')" style="font-size: 14px; cursor:pointer;">
                <img src="${p.image || 'https://picsum.photos/200/200'}" style="height: 120px;">
                <h4 style="font-size: 12px; margin: 5px;">${p.name}</h4>
                <p style="font-size: 14px; margin: 5px;">Ksh ${p.price}</p>
            </div>
        `).join('');

        document.getElementById('modalAddToCartBtn').onclick = () => {
            if (product.sizes && product.sizes.length > 0 && !selectedSize) {
                alert('Please select a size first');
                return;
            }
            const itemToCart = { ...product, selectedSize: selectedSize };
            DataManager.addToCart(itemToCart);
            showToast(`${product.name} added to cart!`);
            cart = DataManager.getCart();
            renderCart();
            updateCartBadge();
        };

        modal.classList.add('show');
        document.body.style.overflow = 'hidden';
    };

    window.closeProductDetails = function() {
        document.getElementById('productDetailsModal').classList.remove('show');
        document.body.style.overflow = 'auto';
    };

    function showToast(msg) {
        const toast = document.getElementById('toast');
        if (toast) {
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    }

    function renderRandom() {
        const container = document.getElementById('random-products');
        const all = DataManager.getAllProducts();
        const flat = Object.keys(all).reduce((acc,k) => acc.concat(all[k]||[]), []);
        const shuffled = flat.sort(() => 0.5 - Math.random()).slice(0, 8);
        container.innerHTML = shuffled.map(p => `
            <div class="product">
                <img src="${p.image || 'https://picsum.photos/200/200'}" onclick="openProductDetails('${p.id}')" style="cursor:pointer;">
                <h4 onclick="openProductDetails('${p.id}')" style="cursor:pointer;">${p.name}</h4>
                <p>Ksh ${p.price}</p>
                <button onclick="addRec('${p.id}')">Add to Cart</button>
            </div>
        `).join('');
    }

    window.addRec = (id) => {
        const all = DataManager.getAllProducts();
        const flat = Object.keys(all).reduce((acc,k) => acc.concat(all[k]||[]), []);
        const p = flat.find(x => x.id === id);
        if (p) { 
            DataManager.addToCart(p); 
            cart = DataManager.getCart(); 
            renderCart(); 
            updateCartBadge();
            alert('Added!'); 
        }
    }

    initSlideshow();
    renderRandom();
    renderCart();

    // Listen for changes from other tabs (e.g. order completed in checkout)
    window.addEventListener('storage', (e) => {
        if (e.key === 'ecommerce_cart') {
            cart = DataManager.getCart();
            renderCart();
            updateCartBadge();
        }
    });
</script>
</body>
</html>
